<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100" viewBox="0 0 800 100">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="100" rx="12" fill="url(#bg2)"/>

  <!-- 6 feature icons with labels -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">

    <!-- Multi-Agent -->
    <g transform="translate(80, 35)">
      <text font-size="28" dy="5">🤖</text>
      <text y="32" font-size="10" fill="#94a3b8">Multi-Agent</text>
    </g>

    <!-- Auto-Discovery -->
    <g transform="translate(210, 35)">
      <text font-size="28" dy="5">🔍</text>
      <text y="32" font-size="10" fill="#94a3b8">Auto-Discover</text>
    </g>

    <!-- Smart Redaction -->
    <g transform="translate(340, 35)">
      <text font-size="28" dy="5">🔐</text>
      <text y="32" font-size="10" fill="#94a3b8">Secret Redaction</text>
    </g>

    <!-- Atomic Writes -->
    <g transform="translate(470, 35)">
      <text font-size="28" dy="5">⚛️</text>
      <text y="32" font-size="10" fill="#94a3b8">Atomic Writes</text>
    </g>

    <!-- SHA-256 -->
    <g transform="translate(600, 35)">
      <text font-size="28" dy="5">🔢</text>
      <text y="32" font-size="10" fill="#94a3b8">SHA-256 Verify</text>
    </g>

    <!-- Zero Deps -->
    <g transform="translate(720, 35)">
      <text font-size="28" dy="5">📦</text>
      <text y="32" font-size="10" fill="#94a3b8">Zero Deps</text>
    </g>

  </g>
</svg>
